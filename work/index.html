<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahad Anwar — Work</title>
  <script>if(localStorage.getItem('fahad-theme')==='light')document.documentElement.dataset.theme='light';</script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:              #07070f;
      --fg:              #fff;
      --nav-bg:          rgba(255,255,255,.055);
      --nav-border:      rgba(255,255,255,.1);
      --nav-link:        rgba(255,255,255,.62);
      --nav-active-bg:   rgba(255,255,255,.14);
      --btn-hover-bg:    rgba(255,255,255,.15);
      --btn-hover-border:rgba(255,255,255,.3);
      --sub-color:       rgba(255,255,255,.48);
      --card-bg:         rgba(255,255,255,.045);
      --card-border:     rgba(255,255,255,.09);
      --card-hover-bg:   rgba(255,255,255,.08);
      --card-hover-border:rgba(255,255,255,.2);
      --label-bg:        rgba(0,0,0,.72);
    }
    html[data-theme="light"] {
      --bg:              #f5f5f5;
      --fg:              #171717;
      --nav-bg:          rgba(0,0,0,.05);
      --nav-border:      rgba(0,0,0,.1);
      --nav-link:        rgba(0,0,0,.5);
      --nav-active-bg:   rgba(0,0,0,.1);
      --btn-hover-bg:    rgba(0,0,0,.1);
      --btn-hover-border:rgba(0,0,0,.25);
      --sub-color:       rgba(0,0,0,.45);
      --card-bg:         rgba(0,0,0,.03);
      --card-border:     rgba(0,0,0,.08);
      --card-hover-bg:   rgba(0,0,0,.06);
      --card-hover-border:rgba(0,0,0,.18);
      --label-bg:        rgba(0,0,0,.75);
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      transition: background .3s, color .3s;
    }

    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── Nav ── */
    .topnav {
      position: fixed;
      top: 1.1rem; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; align-items: center; gap: 2px;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      border-radius: 999px;
      padding: 4px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: background .3s, border-color .3s;
    }
    .nav-link {
      padding: .42rem 1.1rem;
      border-radius: 999px;
      font-size: .84rem; font-weight: 500;
      color: var(--nav-link);
      text-decoration: none;
      letter-spacing: .01em;
      transition: color .18s, background .18s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--fg); }
    .nav-link.active { background: var(--nav-active-bg); color: var(--fg); }

    /* ── Theme toggle ── */
    .theme-btn {
      position: fixed;
      top: 1.1rem; right: 1.5rem;
      z-index: 100;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      color: var(--fg);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, color .3s;
    }
    .theme-btn:hover { background: var(--btn-hover-bg); border-color: var(--btn-hover-border); }
    .theme-btn svg { width: 16px; height: 16px; pointer-events: none; }
    .icon-moon { display: none; }
    html[data-theme="light"] .icon-sun  { display: none; }
    html[data-theme="light"] .icon-moon { display: block; }

    /* ── Scrollable page ── */
    .page {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      z-index: 10;
      overflow-y: auto;
      padding: 3.5rem 3rem 6rem;
    }
    .page::-webkit-scrollbar { width: 4px; }
    .page::-webkit-scrollbar-track { background: transparent; }
    .page::-webkit-scrollbar-thumb { background: rgba(128,128,128,.2); border-radius: 999px; }

    /* ── Work header ── */
    .work-header { max-width: 1100px; margin: 0 auto 2.8rem; }
    .work-title  { font-size: 2.6rem; font-weight: 700; margin-bottom: .55rem; }
    .work-sub    { font-size: .95rem; color: var(--sub-color); max-width: 440px; line-height: 1.6; }

    /* ── Two-column staggered grid ── */
    .work-columns {
      display: flex; gap: 1.1rem;
      max-width: 1100px; margin: 0 auto;
      align-items: flex-start;
    }
    .col { flex: 1; display: flex; flex-direction: column; gap: 1.1rem; }
    .col-right { margin-top: 5rem; }

    /* ── Project card ── */
    .project-card {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .22s, box-shadow .22s;
    }
    .project-card:hover {
      transform: scale(1.02);
      box-shadow: 0 16px 48px rgba(0,0,0,.4);
    }
    .card-img {
      width: 100%; display: block;
      background-size: cover;
      background-position: center;
    }
    .card-label {
      position: absolute;
      top: 14px; left: 14px;
      background: var(--label-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 9px;
      padding: 7px 13px;
      font-size: .84rem; font-weight: 600;
      color: #fff;
      letter-spacing: .01em;
      max-width: calc(100% - 28px);
      line-height: 1.35;
    }

  </style>
</head>
<body data-page="work">

  <canvas id="canvas"></canvas>

  <nav class="topnav">
    <a href="../"       class="nav-link" data-page="home">Home</a>
    <a href="../work/"  class="nav-link" data-page="work">Work</a>
    <a href="../about/" class="nav-link" data-page="about">About</a>
  </nav>

  <button class="theme-btn" id="themeToggle" title="Toggle light / dark">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1"  x2="12" y2="3"/>  <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22"   x2="5.64"  y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1"  y1="12" x2="3"  y2="12"/> <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
      <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="page">
    <div class="work-header">
      <h1 class="work-title">My Work</h1>
      <p class="work-sub">See what I've been building. More projects on the way.</p>
    </div>

    <div class="work-columns">
      <div class="col col-left">
        <div class="project-card">
          <!-- Replace background-image with url('../images/photo.jpg') when ready -->
          <div class="card-img" style="height:340px;background-image:linear-gradient(160deg,#0d1b2a,#1b2a3b 40%,#0a2240)"></div>
          <div class="card-label">Project Title</div>
        </div>
        <div class="project-card">
          <div class="card-img" style="height:260px;background-image:linear-gradient(160deg,#1a0a2e,#2e1065 50%,#1a0a2e)"></div>
          <div class="card-label">Project Title</div>
        </div>
        <div class="project-card">
          <div class="card-img" style="height:300px;background-image:linear-gradient(160deg,#071a12,#0d3321 50%,#071a12)"></div>
          <div class="card-label">Project Title</div>
        </div>
      </div>

      <div class="col col-right">
        <div class="project-card">
          <div class="card-img" style="height:310px;background-image:linear-gradient(160deg,#1a1200,#3b2a00 50%,#1a1200)"></div>
          <div class="card-label">Project Title</div>
        </div>
        <div class="project-card">
          <div class="card-img" style="height:280px;background-image:linear-gradient(160deg,#0a1a1a,#0d3333 50%,#0a1a1a)"></div>
          <div class="card-label">Project Title</div>
        </div>
        <div class="project-card">
          <div class="card-img" style="height:320px;background-image:linear-gradient(160deg,#1a0a14,#3b0a28 50%,#1a0a14)"></div>
          <div class="card-label">Project Title</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const html = document.documentElement;
    document.getElementById('themeToggle').addEventListener('click', () => {
      const light = html.dataset.theme === 'light';
      html.dataset.theme = light ? '' : 'light';
      localStorage.setItem('fahad-theme', light ? 'dark' : 'light');
    });

    document.querySelectorAll('.nav-link').forEach(l => {
      if (l.dataset.page === document.body.dataset.page) l.classList.add('active');
    });

    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    function resize() {
      const scaleX = innerWidth  / (canvas.width  || innerWidth);
      const scaleY = innerHeight / (canvas.height || innerHeight);
      canvas.width = innerWidth; canvas.height = innerHeight;
      for (const p of ambient) { p.x *= scaleX; p.y *= scaleY; }
    }
    resize();
    window.addEventListener('resize', resize);

    const ambient = [];
    for (let i = 0; i < 120; i++) {
      ambient.push({
        x: Math.random() * innerWidth,  y: Math.random() * innerHeight,
        vx: (Math.random() - 0.5) * 0.28, vy: (Math.random() - 0.5) * 0.28,
        size: 1.2 + Math.random() * 2.6,   alpha: 0.18 + Math.random() * 0.28,
      });
    }

    const initX = innerWidth / 2;
    const initY = Math.max(80, innerHeight / 2 - 190);
    const TRAIL = 24;
    const trail = Array.from({ length: TRAIL }, () => ({ x: initX, y: initY, vx: 0, vy: 0 }));
    const ptr = { x: initX, y: initY };
    let ptrMoved = false;

    document.addEventListener('pointermove', e => {
      ptr.x = e.clientX; ptr.y = e.clientY; ptrMoved = true;
    });

    let lastFrame = performance.now();
    function draw() {
      const now = performance.now();
      const dt  = Math.min((now - lastFrame) / 16.67, 2);
      lastFrame = now;
      const t = now * 0.001;
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      const dark = html.dataset.theme !== 'light';
      const pRgb = dark ? '238,240,248' : '40,40,40';
      const sRgb = dark ? '242,244,252' : '20,20,20';

      for (const p of ambient) {
        p.x += p.vx * dt; p.y += p.vy * dt;
        if (p.x < -6) p.x = W + 6; if (p.x > W + 6) p.x = -6;
        if (p.y < -6) p.y = H + 6; if (p.y > H + 6) p.y = -6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${pRgb},${p.alpha})`;
        ctx.fill();
      }

      const head = trail[0];
      const tx = ptrMoved ? ptr.x : initX + Math.sin(t * 0.8)  * W * 0.04;
      const ty = ptrMoved ? ptr.y : initY + Math.cos(t * 1.05) * H * 0.03;
      head.vx += (tx - head.x) * 0.04 * dt; head.vy += (ty - head.y) * 0.04 * dt;
      head.vx *= 0.84; head.vy *= 0.84;
      head.x += head.vx * dt; head.y += head.vy * dt;

      for (let i = 1; i < TRAIL; i++) {
        const prev = trail[i - 1], seg = trail[i];
        const f = (0.22 - i * 0.004) * dt;
        seg.x += (prev.x - seg.x) * f; seg.y += (prev.y - seg.y) * f;
      }

      for (let i = TRAIL - 1; i >= 0; i--) {
        const ratio = 1 - i / TRAIL;
        ctx.beginPath();
        ctx.arc(trail[i].x, trail[i].y, 1 + ratio * 6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${sRgb},${0.03 + ratio * 0.28})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
