<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahad Anwar — Work</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07070f;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── Nav ── */
    .topnav {
      position: fixed;
      top: 1.1rem; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; align-items: center; gap: 2px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      padding: 4px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .nav-link {
      padding: .42rem 1.1rem;
      border-radius: 999px;
      font-size: .84rem; font-weight: 500;
      color: rgba(255,255,255,.62);
      text-decoration: none;
      letter-spacing: .01em;
      transition: color .18s, background .18s;
      white-space: nowrap;
    }
    .nav-link:hover { color: rgba(255,255,255,.92); }
    .nav-link.active { background: rgba(255,255,255,.14); color: #fff; }

    /* ── Scrollable page area ── */
    .page {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      z-index: 10;
      overflow-y: auto;
      padding: 3.5rem 3rem 6rem;
    }
    .page::-webkit-scrollbar { width: 4px; }
    .page::-webkit-scrollbar-track { background: transparent; }
    .page::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.12);
      border-radius: 999px;
    }

    /* ── Work header (left-aligned) ── */
    .work-header {
      max-width: 1100px;
      margin: 0 auto 2.8rem;
    }
    .work-title {
      font-size: 2.6rem; font-weight: 700;
      margin-bottom: .55rem;
    }
    .work-sub {
      font-size: .95rem;
      color: rgba(255,255,255,.48);
      max-width: 440px;
      line-height: 1.6;
    }

    /* ── Two-column staggered grid ── */
    .work-columns {
      display: flex;
      gap: 1.1rem;
      max-width: 1100px;
      margin: 0 auto;
      align-items: flex-start;
    }
    .col { flex: 1; display: flex; flex-direction: column; gap: 1.1rem; }
    .col-right { margin-top: 5rem; }

    /* ── Project card ── */
    .project-card {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .22s, box-shadow .22s;
    }
    .project-card:hover {
      transform: scale(1.02);
      box-shadow: 0 16px 48px rgba(0,0,0,.55);
    }

    /* The "image" — replace background with url('your-image.jpg') center/cover */
    .card-img {
      width: 100%;
      display: block;
      /* default height — override per-card if needed */
      height: 300px;
      background-size: cover;
      background-position: center;
    }

    /* Title badge overlaid on image */
    .card-label {
      position: absolute;
      top: 14px; left: 14px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 9px;
      padding: 7px 13px;
      font-size: .84rem; font-weight: 600;
      color: #fff;
      letter-spacing: .01em;
      max-width: calc(100% - 28px);
      line-height: 1.35;
    }

  </style>
</head>
<body data-page="work">

  <canvas id="canvas"></canvas>

  <nav class="topnav">
    <a href="index.html" class="nav-link" data-page="home">Home</a>
    <a href="work.html"  class="nav-link" data-page="work">Work</a>
    <a href="about.html" class="nav-link" data-page="about">About</a>
  </nav>

  <div class="page">

    <div class="work-header">
      <h1 class="work-title">My Work</h1>
      <p class="work-sub">See what I've been building. More projects on the way.</p>
    </div>

    <div class="work-columns">

      <!-- LEFT COLUMN -->
      <div class="col col-left">

        <div class="project-card">
          <!--
            To add a real image: replace the background style below with
            background-image: url('images/your-photo.jpg');
            and remove the background gradient.
          -->
          <div class="card-img" style="
            height: 340px;
            background-image:
              linear-gradient(160deg, #0d1b2a 0%, #1b2a3b 40%, #0a2240 100%);
          "></div>
          <div class="card-label">Project Title</div>
        </div>

        <div class="project-card">
          <div class="card-img" style="
            height: 260px;
            background-image:
              linear-gradient(160deg, #1a0a2e 0%, #2e1065 50%, #1a0a2e 100%);
          "></div>
          <div class="card-label">Project Title</div>
        </div>

        <div class="project-card">
          <div class="card-img" style="
            height: 300px;
            background-image:
              linear-gradient(160deg, #071a12 0%, #0d3321 50%, #071a12 100%);
          "></div>
          <div class="card-label">Project Title</div>
        </div>

      </div>

      <!-- RIGHT COLUMN (offset down for stagger) -->
      <div class="col col-right">

        <div class="project-card">
          <div class="card-img" style="
            height: 310px;
            background-image:
              linear-gradient(160deg, #1a1200 0%, #3b2a00 50%, #1a1200 100%);
          "></div>
          <div class="card-label">Project Title</div>
        </div>

        <div class="project-card">
          <div class="card-img" style="
            height: 280px;
            background-image:
              linear-gradient(160deg, #0a1a1a 0%, #0d3333 50%, #0a1a1a 100%);
          "></div>
          <div class="card-label">Project Title</div>
        </div>

        <div class="project-card">
          <div class="card-img" style="
            height: 320px;
            background-image:
              linear-gradient(160deg, #1a0a14 0%, #3b0a28 50%, #1a0a14 100%);
          "></div>
          <div class="card-label">Project Title</div>
        </div>

      </div>

    </div>
  </div>

  <script>
    /* ── Nav active state ── */
    const page = document.body.dataset.page;
    document.querySelectorAll('.nav-link').forEach(l => {
      if (l.dataset.page === page) l.classList.add('active');
    });

    /* ── Canvas ── */
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    /* ── Stars — slightly larger ── */
    const stars = Array.from({ length: 190 }, () => ({
      x:          Math.random() * innerWidth,
      y:          Math.random() * innerHeight,
      r:          Math.random() * 2.0 + 0.7,
      baseOp:     Math.random() * 0.32 + 0.1,
      phase:      Math.random() * Math.PI * 2,
      phaseSpeed: Math.random() * 0.0025 + 0.0008,
      amp:        Math.random() * 0.1  + 0.03,
      dx:         (Math.random() - 0.5) * 0.09,
      dy:         (Math.random() - 0.5) * 0.09,
    }));

    /* ── Cursor chain ── */
    const LINKS = 26;
    const LERP  = 0.085;
    let rawX = innerWidth / 2, rawY = innerHeight / 2;
    const chain = Array.from({ length: LINKS }, () => ({ x: rawX, y: rawY }));

    document.addEventListener('mousemove', e => {
      rawX = e.clientX; rawY = e.clientY;
    });

    /* ── Render loop ── */
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const W = canvas.width, H = canvas.height;

      stars.forEach(s => {
        s.phase += s.phaseSpeed;
        const op = Math.max(0, Math.min(1, s.baseOp + Math.sin(s.phase) * s.amp));
        s.x = (s.x + s.dx + W) % W;
        s.y = (s.y + s.dy + H) % H;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210,215,232,${op})`;
        ctx.fill();
      });

      chain[0].x += (rawX - chain[0].x) * LERP;
      chain[0].y += (rawY - chain[0].y) * LERP;
      for (let i = 1; i < LINKS; i++) {
        chain[i].x += (chain[i-1].x - chain[i].x) * LERP;
        chain[i].y += (chain[i-1].y - chain[i].y) * LERP;
      }

      for (let i = 0; i < LINKS; i++) {
        const t     = i / (LINKS - 1);
        const size  = (1 - t) * 6.5 + 0.5;
        const alpha = (1 - t) * 0.55 + 0.02;
        ctx.beginPath();
        ctx.arc(chain[i].x, chain[i].y, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(218,222,240,${alpha})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
