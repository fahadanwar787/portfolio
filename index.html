<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahad Anwar</title>
  <!-- Prevent light/dark flash before CSS loads -->
  <script>if(localStorage.getItem('fahad-theme')==='light')document.documentElement.dataset.theme='light';</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Theme variables ── */
    :root {
      --bg:              #07070f;
      --fg:              #fff;
      --bio:             rgba(255,255,255,.82);
      --nav-bg:          rgba(255,255,255,.055);
      --nav-border:      rgba(255,255,255,.1);
      --nav-link:        rgba(255,255,255,.62);
      --nav-active-bg:   rgba(255,255,255,.14);
      --btn-bg:          rgba(255,255,255,.07);
      --btn-border:      rgba(255,255,255,.1);
      --btn-hover-bg:    rgba(255,255,255,.15);
      --btn-hover-border:rgba(255,255,255,.3);
      --avatar-bg:       #12122a;
      --avatar-border:   rgba(255,255,255,.17);
    }
    html[data-theme="light"] {
      --bg:              #f5f5f5;
      --fg:              #171717;
      --bio:             rgba(0,0,0,.6);
      --nav-bg:          rgba(0,0,0,.05);
      --nav-border:      rgba(0,0,0,.1);
      --nav-link:        rgba(0,0,0,.5);
      --nav-active-bg:   rgba(0,0,0,.1);
      --btn-bg:          rgba(0,0,0,.06);
      --btn-border:      rgba(0,0,0,.12);
      --btn-hover-bg:    rgba(0,0,0,.1);
      --btn-hover-border:rgba(0,0,0,.25);
      --avatar-bg:       #e0e0e0;
      --avatar-border:   rgba(0,0,0,.15);
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      cursor: none;
      transition: background .3s, color .3s;
    }

    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── Nav ── */
    .topnav {
      position: fixed;
      top: 1.1rem; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; align-items: center; gap: 2px;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      border-radius: 999px;
      padding: 4px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: background .3s, border-color .3s;
    }
    .nav-link {
      padding: .42rem 1.1rem;
      border-radius: 999px;
      font-size: .84rem; font-weight: 500;
      color: var(--nav-link);
      text-decoration: none;
      letter-spacing: .01em;
      transition: color .18s, background .18s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--fg); }
    .nav-link.active { background: var(--nav-active-bg); color: var(--fg); }

    /* ── Theme toggle (top-right) ── */
    .theme-btn {
      position: fixed;
      top: 1.1rem; right: 1.5rem;
      z-index: 100;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      color: var(--fg);
      cursor: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, color .3s;
    }
    .theme-btn:hover { background: var(--btn-hover-bg); border-color: var(--btn-hover-border); }
    .theme-btn svg { width: 16px; height: 16px; pointer-events: none; }
    .icon-moon { display: none; }
    html[data-theme="light"] .icon-sun  { display: none; }
    html[data-theme="light"] .icon-moon { display: block; }

    /* ── Page ── */
    .page {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }

    .hero {
      text-align: center;
      padding: 2rem;
      display: flex; flex-direction: column;
      align-items: center;
    }

    .avatar {
      width: 118px; height: 118px;
      border-radius: 50%;
      border: 2px solid var(--avatar-border);
      background: var(--avatar-bg);
      margin-bottom: 1.4rem;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 5px rgba(128,128,128,.04);
      transition: background .3s, border-color .3s;
    }
    .avatar svg { opacity: .2; fill: var(--fg); }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 2.85rem; font-weight: 800;
      letter-spacing: -.01em;
      color: var(--fg);
      margin-bottom: .9rem;
      min-height: 3.5rem;
      transition: color .3s;
    }

    .bio {
      font-size: 1.0rem;
      color: var(--bio);
      max-width: 560px; line-height: 1.7;
      margin-bottom: 1.9rem; min-height: 4rem;
      transition: color .3s;
    }

    .tcursor {
      display: inline-block; width: 2px; height: .85em;
      background: var(--fg); margin-left: 1px;
      vertical-align: -.05em;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .socials { display: flex; gap: .65rem; }
    .s-btn {
      width: 46px; height: 46px; border-radius: 10px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--fg);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: background .18s, border-color .18s, transform .15s, box-shadow .18s;
    }
    .s-btn:hover {
      background: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,.15);
    }
    .s-btn svg { width: 23px; height: 23px; fill: currentColor; pointer-events: none; }

    /* Small dot exactly at real pointer position */
    #dot {
      position: fixed; width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--fg);
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      opacity: .5;
      transition: background .3s;
    }
  </style>
</head>
<body data-page="home">

  <canvas id="canvas"></canvas>

  <nav class="topnav">

    <a href="./work/" class="nav-link" data-page="work">Work</a>
    <a href="./about/" class="nav-link" data-page="about">About</a>
  </nav>

  <button class="theme-btn" id="themeToggle" title="Toggle light / dark">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <line x1="1"  y1="12" x2="3"  y2="12"/> <line x1="21" y1="12" x2="23" y2="12"/>

    </svg>

      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="page">
    <div class="hero">
      <div class="avatar">
        <!-- Replace SVG with: <img src="your-photo.jpg" alt="Fahad Anwar"> -->
        <svg viewBox="0 0 24 24" width="56" height="56">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4
                   7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6
                   1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
      <h1 class="name" id="nameEl"></h1>
      <p  class="bio"  id="bioEl"></p>
      <div class="socials">
        <a href="#" class="s-btn" title="GitHub">
          <svg viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        </a>
        <a href="#" class="s-btn" title="LinkedIn">
          <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15h8v2H8zm0-4h8v2H8zm0-4h5v2H8z"/></svg>

          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>

    </div>
  </div>

  <div id="dot"></div>

  <script>
    /* ── Theme toggle ── */
    const html = document.documentElement;
    document.getElementById('themeToggle').addEventListener('click', () => {
      const light = html.dataset.theme === 'light';
      html.dataset.theme = light ? '' : 'light';
      localStorage.setItem('fahad-theme', light ? 'dark' : 'light');
    });

    /* ── Nav active ── */
    document.querySelectorAll('.nav-link').forEach(l => {
      if (l.dataset.page === document.body.dataset.page) l.classList.add('active');
    });

    /* ── Canvas ── */
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    /* ── Ambient particles (velocity-based, wrapping) ── */
    const ambient = [];
    for (let i = 0; i < 120; i++) {
      ambient.push({
        x:     Math.random() * innerWidth,
        y:     Math.random() * innerHeight,
        vx:    (Math.random() - 0.5) * 0.28,
        vy:    (Math.random() - 0.5) * 0.28,
        size:  1.2 + Math.random() * 2.6,
        alpha: 0.18 + Math.random() * 0.28,
      });
    }

    /* ── Spring-physics cursor trail (ported from reference) ── */
    const initX = innerWidth  / 2;
    const initY = Math.max(80, innerHeight / 2 - 190);
    const TRAIL = 24;
    const trail = Array.from({ length: TRAIL }, () => ({ x: initX, y: initY, vx: 0, vy: 0 }));

    const ptr = { x: initX, y: initY };
    let ptrMoved = false;
    const dotEl = document.getElementById('dot');

    document.addEventListener('pointermove', e => {
      ptr.x = e.clientX; ptr.y = e.clientY;
      ptrMoved = true;
      dotEl.style.left = e.clientX + 'px';
      dotEl.style.top  = e.clientY + 'px';
    });

    /* ── Render loop ── */
    let lastFrame = performance.now();

    function draw() {
      const now = performance.now();
      const dt  = Math.min((now - lastFrame) / 16.67, 2);
      lastFrame = now;
      const t = now * 0.001;
      const W = canvas.width, H = canvas.height;

      ctx.clearRect(0, 0, W, H);

      const dark = html.dataset.theme !== 'light';
      const pRgb = dark ? '210,215,232' : '40,40,40';
      const sRgb = dark ? '218,222,240' : '20,20,20';

      /* Ambient */
      for (const p of ambient) {
        p.x += p.vx * dt;  p.y += p.vy * dt;
        if (p.x < -6) p.x = W + 6; if (p.x > W + 6) p.x = -6;
        if (p.y < -6) p.y = H + 6; if (p.y > H + 6) p.y = -6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${pRgb},${p.alpha})`;
        ctx.fill();
      }

      /* Head spring toward pointer (idle sine when no pointer) */
      const head = trail[0];
      const idleX = initX + Math.sin(t * 0.8)  * W * 0.04;
      const idleY = initY + Math.cos(t * 1.05) * H * 0.03;
      const tx = ptrMoved ? ptr.x : idleX;
      const ty = ptrMoved ? ptr.y : idleY;

      head.vx += (tx - head.x) * 0.04 * dt;
      head.vy += (ty - head.y) * 0.04 * dt;
      head.vx *= 0.84;  head.vy *= 0.84;
      head.x  += head.vx * dt;
      head.y  += head.vy * dt;

      /* Each segment follows the one ahead, lerp decreases down the tail */
      for (let i = 1; i < TRAIL; i++) {
        const prev = trail[i - 1], seg = trail[i];
        const f = (0.22 - i * 0.004) * dt;
        seg.x += (prev.x - seg.x) * f;
        seg.y += (prev.y - seg.y) * f;
      }

      /* Draw back-to-front so head is on top */
      for (let i = TRAIL - 1; i >= 0; i--) {
        const ratio = 1 - i / TRAIL;
        ctx.beginPath();
        ctx.arc(trail[i].x, trail[i].y, 1 + ratio * 6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${sRgb},${0.03 + ratio * 0.28})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }
    draw();

    /* ── Typewriter ── */
    const nameEl = document.getElementById('nameEl');
    const bioEl  = document.getElementById('bioEl');

    function typeInto(el, text, delay, done) {
      const cur = document.createElement('span');
      cur.className = 'tcursor';
      el.appendChild(cur);
      let i = 0;
      const tick = setInterval(() => {
        if (i < text.length) cur.insertAdjacentText('beforebegin', text[i++]);
        else { clearInterval(tick); if (done) done(cur); }
      }, delay);
    }

    setTimeout(() => {
      typeInto(nameEl, 'Fahad Anwar', 75, cur => {
        setTimeout(() => {
          cur.remove();
          setTimeout(() => typeInto(bioEl,
            'A student passionate about software engineering and building things that matter. ' +
            'Currently exploring full-stack development, mobile apps, and whatever comes next.',
            22, () => {}), 150);
        }, 550);
      });
    }, 500);
  </script>
</body>
