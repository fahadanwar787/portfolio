<head>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07070f;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ── Nav ── */
    .topnav {
      position: fixed;
      top: 1.1rem; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; align-items: center; gap: 2px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      padding: 4px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .nav-link {
      padding: .42rem 1.1rem;
      border-radius: 999px;
      font-size: .84rem; font-weight: 500;
      color: rgba(255,255,255,.62);
      text-decoration: none;
      letter-spacing: .01em;
      transition: color .18s, background .18s;
      white-space: nowrap;
    }
    .nav-link:hover { color: rgba(255,255,255,.92); }
    .nav-link.active {
      background: rgba(255,255,255,.14);
      color: #fff;
    }

    /* ── Page area ── */
    .page {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 2rem;
      display: flex; flex-direction: column;
      align-items: center;
    }

    .avatar {
      width: 118px; height: 118px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.17);
      background: #12122a;
      margin-bottom: 1.4rem;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 5px rgba(255,255,255,.035);
    }
    .avatar svg { opacity: .2; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 2.85rem; font-weight: 800;
      letter-spacing: -.01em;
      margin-bottom: .9rem;
      min-height: 3.5rem;
    }

    .bio {
      font-size: 1.0rem; color: rgba(255,255,255,.82);
      max-width: 560px; line-height: 1.7;
      margin-bottom: 1.9rem; min-height: 4rem;
    }

    /* Typewriter cursor */
    .tcursor {
      display: inline-block; width: 2px; height: .85em;
      background: rgba(255,255,255,.8); margin-left: 1px;
      vertical-align: -.05em;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Social buttons */
    .socials { display: flex; gap: .65rem; }
    .s-btn {
      width: 46px; height: 46px; border-radius: 10px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: background .18s, border-color .18s, color .18s,
                  transform .15s, box-shadow .18s;
    }
    .s-btn:hover {
      background: rgba(255,255,255,.15);
      border-color: rgba(255,255,255,.3);
      color: #fff; transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,.3);
    }
    .s-btn svg { width: 23px; height: 23px; fill: currentColor; pointer-events: none; }

    /* Cursor dot */
    #dot {
      position: fixed; width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(220,225,240,.95);
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
    }
  </style>
</head>
<body data-page="home">

  <div id="dot"></div>

  <script>
    /* ── Nav active state ── */
    const page = document.body.dataset.page;
    document.querySelectorAll('.nav-link').forEach(l => {
      if (l.dataset.page === page) l.classList.add('active');
    });

    /* ── Canvas ── */
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    /* ── Stars: slow drift, gentle sine-wave opacity ── */
    const stars = Array.from({ length: 190 }, () => ({
      x:          Math.random() * innerWidth,
      y:          Math.random() * innerHeight,
      r:          Math.random() * 2.0 + 0.7,
      baseOp:     Math.random() * 0.32 + 0.1,
      phase:      Math.random() * Math.PI * 2,
      phaseSpeed: Math.random() * 0.0025 + 0.0008,
      amp:        Math.random() * 0.1  + 0.03,
      dx:         (Math.random() - 0.5) * 0.09,
      dy:         (Math.random() - 0.5) * 0.09,
    }));

    /* ── Cursor chain ── */
    const LINKS = 26;
    const LERP  = 0.085;
    let rawX = innerWidth / 2, rawY = innerHeight / 2;
    const chain = Array.from({ length: LINKS }, () => ({ x: rawX, y: rawY }));
    const dot   = document.getElementById('dot');

    document.addEventListener('mousemove', e => {
      rawX = e.clientX; rawY = e.clientY;
      dot.style.left = rawX + 'px';
      dot.style.top  = rawY + 'px';
    });

    /* ── Render loop ── */
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const W = canvas.width, H = canvas.height;

      /* Stars */
      stars.forEach(s => {
        s.phase += s.phaseSpeed;
        const op = Math.max(0, Math.min(1, s.baseOp + Math.sin(s.phase) * s.amp));
        s.x = (s.x + s.dx + W) % W;
        s.y = (s.y + s.dy + H) % H;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210,215,232,${op})`;
        ctx.fill();
      });

      /* Chain: each link lerps toward the one in front of it */
      chain[0].x += (rawX - chain[0].x) * LERP;
      chain[0].y += (rawY - chain[0].y) * LERP;
      for (let i = 1; i < LINKS; i++) {
        chain[i].x += (chain[i-1].x - chain[i].x) * LERP;
        chain[i].y += (chain[i-1].y - chain[i].y) * LERP;
      }

      /* Draw chain — head (i=0) is biggest/brightest, tail fades out */
      for (let i = 0; i < LINKS; i++) {
        const t     = i / (LINKS - 1);
        const size  = (1 - t) * 6.5 + 0.5;
        const alpha = (1 - t) * 0.52 + 0.02;
        ctx.beginPath();
        ctx.arc(chain[i].x, chain[i].y, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(218,222,240,${alpha})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }
    draw();

    /* ── Typewriter ── */
    const NAME_TEXT = "Fahad Anwar";
    const BIO_TEXT  = "A student passionate about software engineering and " +
                      "building things that matter. Currently exploring " +
                      "full-stack development, mobile apps, and whatever comes next.";

    const nameEl = document.getElementById('nameEl');
    const bioEl  = document.getElementById('bioEl');

    function typeInto(el, text, delay, done) {
      const cur = document.createElement('span');
      cur.className = 'tcursor';
      el.appendChild(cur);
      let i = 0;
      const tick = setInterval(() => {
        if (i < text.length) { cur.insertAdjacentText('beforebegin', text[i++]); }
        else { clearInterval(tick); if (done) done(cur); }
      }, delay);
    }

    setTimeout(() => {
      typeInto(nameEl, NAME_TEXT, 75, cur => {
        setTimeout(() => {
          cur.remove();
          setTimeout(() => typeInto(bioEl, BIO_TEXT, 22, () => {}), 150);
        }, 550);
      });
    }, 500);
  </script>
